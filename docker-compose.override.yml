# Merged automatically with docker-compose.yml by Docker Compose.
# In-container firewall (init-firewall.sh): NET_ADMIN for iptables;
# extra_hosts if need to have host.docker.internal resolves on Linux (see init-firewall.sh).
services:
  nanobot-gateway:
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
    cap_add:
        # init-firewall.sh is invoked via sudo in entrypoint.sh; sudo needs these
        # capabilities when capabilities are otherwise dropped (cap_drop: ALL).
      - NET_ADMIN
      - SETUID
      - SETGID
  nanobot-api:
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
    # Use the same workspace in api as with cli:
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/workspace"]
    cap_add:
      - NET_ADMIN
  nanobot-cli:
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
    cap_add:
      - NET_ADMIN
